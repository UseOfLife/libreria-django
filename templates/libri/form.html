{% extends 'base.html' %} {% block titolo %}{{ azione }}{% endblock %} 
{% block contenuto %}
<h1>{{ azione }}</h1>

<form method="POST">
  {% csrf_token %}
  {% for field in form %}
  <div class="form-container">
    <div class="form-label-container">{{ field.label_tag }}</div>
    <div class="form-input-container"><strong>>>></strong>{{ field }}</div>
  </div>
  {% endfor %}
  <button type="submit">Salva</button>
</form>
{% endblock %}
