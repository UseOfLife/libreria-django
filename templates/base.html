{% load static %}
<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="{% static 'style.css' %}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <title>{% block titolo %}Libreria{% endblock %}</title>

  </head>
  <body>

    <nav>

      <div class="catalogo">
        <a href="/libri/">Catalogo</a>
      </div>

      <div class="opzioni">
        {% if user.is_authenticated %}

          <p>Ciao, {{ user.username }}!</p>
          <a href="{% url 'aggiungi_libro' %}">Aggiungi libro</a>
          <a href="{% url 'logout' %}">Esci</a>
        {% else %}

          <a href="{% url 'login' %}">Accedi</a> 
          <a href="{% url 'registrazione' %}">Registrati</a>

        {% endif %}
      </div>

    </nav>

    <main>{% block contenuto %}{% endblock %}</main>
  </body>
</html>
