{% extends 'base.html' %} {% block titolo %}Accedi{% endblock %} 
{% block contenuto %}
<h1>Accedi</h1>

<form method="POST">
  {% csrf_token %}
  {% for field in form %}
  <div class="form-container">
    <div class="form-label-container">{{ field.label_tag }}</div>
    <div class="form-input-container"><strong>>>></strong>{{ field }}</div>
  </div>
  {% endfor %}
  <button type="submit">Accedi</button>
</form>

{% endblock %}
